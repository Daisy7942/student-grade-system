services:
  # 데이터베이스 서비스 (MySQL)
  db:
    image: mysql:8.0
    container_name: student_grade_db
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: root1234
      MYSQL_DATABASE: student_grade_db
      MYSQL_USER: student_user
      MYSQL_PASSWORD: student1234
      TZ: Asia/Seoul
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql

  # 백엔드 API 서버 (Node.js)
  backend:
    build: ./backend
    container_name: student_grade_backend
    ports:
      - "5000:5000"
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: student_user
      DB_PASSWORD: student1234
      DB_NAME: student_grade_db
    depends_on:
      - db

  # 프론트엔드 웹 서버 (Nginx)
  frontend:
    build: ./frontend
    container_name: student_grade_frontend
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  db_data:
