services:
  backend:
    build: ./backend
    container_name: student_grade_backend
    ports:
      - "5000:5000"
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: student_user
      DB_PASSWORD: student1234
      DB_NAME: student_grade_db
    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: student_grade_db
    environment:
      MYSQL_ROOT_PASSWORD: root1234
      MYSQL_DATABASE: student_grade_db
      MYSQL_USER: student_user
      MYSQL_PASSWORD: student1234
      TZ: Asia/Seoul
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  db_data: